name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://azanabid.github.io/my_portfolio/
    env:
      VITE_BASE_PATH: ./
      VITE_CONTACT_DELIVERY: mailto
      VITE_API_BASE_URL: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check runtime
        run: |
          node --version
          npm --version

      - name: Install
        run: npm ci --prefix client

      - name: Build
        run: npm run build --prefix client

      - name: Publish static site to gh-pages
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          deploy_dir="$RUNNER_TEMP/gh-pages"
          rm -rf "$deploy_dir"
          mkdir -p "$deploy_dir"

          git init "$deploy_dir"
          git -C "$deploy_dir" checkout -b gh-pages
          git -C "$deploy_dir" config user.name "github-actions[bot]"
          git -C "$deploy_dir" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$deploy_dir" remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git -C "$deploy_dir" fetch origin gh-pages --depth=1 || true

          if git -C "$deploy_dir" rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git -C "$deploy_dir" reset --hard origin/gh-pages
          fi

          find "$deploy_dir" -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R client/dist/. "$deploy_dir"/
          touch "$deploy_dir/.nojekyll"

          git -C "$deploy_dir" add -A
          if git -C "$deploy_dir" diff --cached --quiet; then
            echo "No static changes to deploy."
          else
            git -C "$deploy_dir" commit -m "Deploy static site"
          fi

          git -C "$deploy_dir" push origin HEAD:gh-pages
